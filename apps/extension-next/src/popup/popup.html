<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <title>Kibitzer</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        font: 14px/1.4 system-ui, -apple-system, "Segoe UI", sans-serif;
        margin: 0; padding: 14px; width: 260px;
      }
      h1 { font-size: 13px; margin: 0 0 10px; color: #888; font-weight: 600; letter-spacing: .04em; }
      .gauge { font-size: 26px; font-weight: 650; margin-bottom: 12px; font-variant-numeric: tabular-nums; }
      .gauge small { font-size: 13px; color: #888; font-weight: 500; }
      label { display: block; font-size: 12px; color: #888; margin-bottom: 8px; }
      input { width: 100%; box-sizing: border-box; padding: 7px 9px; margin-top: 3px;
        border: 1px solid #8884; border-radius: 8px; background: transparent; color: inherit; font: inherit; }
      .row { display: flex; gap: 8px; align-items: end; }
      .row label { flex: 1; }
      .row label.mins { flex: 0 0 78px; }
      button { margin-top: 12px; width: 100%; padding: 8px; border: 0; border-radius: 8px;
        background: #4a5bd4; color: #fff; font: inherit; font-weight: 600; cursor: pointer; }
    </style>
  </head>
  <body>
    <h1>KIBITZER (next)</h1>
    <div class="gauge" id="gauge">–</div>
    <div class="row">
      <label>목표<input id="goal" placeholder="예: 논문 정리" /></label>
      <label class="mins">시간(분)<input id="minutes" type="number" min="1" placeholder="60" /></label>
    </div>
    <button id="set">설정</button>
    <script type="module" src="popup.js"></script>
  </body>
</html>
