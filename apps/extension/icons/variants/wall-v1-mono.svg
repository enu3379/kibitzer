<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" role="img" aria-label="Kibitzer">
  <!-- macOS menubar template glyph: single colour, hands dropped for small-size clarity.
       Eyes AND a thin transparent slit along the ledge's top edge are punched out,
       so head and ledge read as separate even when tinted one colour. -->
  <defs>
    <mask id="cut">
      <rect width="128" height="128" fill="#fff"/>
      <circle cx="51" cy="60" r="8" fill="#000"/>
      <circle cx="77" cy="60" r="8" fill="#000"/>
      <rect x="10" y="72" width="108" height="4" rx="2" fill="#000"/>
    </mask>
  </defs>
  <g fill="#1F2937" mask="url(#cut)">
    <circle cx="64" cy="74" r="36"/>
    <rect x="10" y="74" width="108" height="38" rx="9"/>
  </g>
</svg>
