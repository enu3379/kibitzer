name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    name: ${{ matrix.os }} / py${{ matrix.python-version }} / node${{ matrix.node-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest
        python-version:
          - "3.11"
        node-version:
          - "22"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: apps/extension/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test,package]"

      - name: Run server tests
        run: python -m pytest apps/server/tests -q

      - name: Build packaged server
        run: python -m PyInstaller --clean --noconfirm packaging/kibitzer.spec

      - name: Smoke packaged server
        run: python scripts/smoke_packaged_server.py --dist-dir dist/kibitzer

      - name: Install extension dependencies
        working-directory: apps/extension
        run: npm ci

      - name: Build extension
        working-directory: apps/extension
        run: npm run build

      - name: Install extension-next dependencies
        working-directory: apps/extension-next
        run: npm ci

      - name: Build extension-next
        working-directory: apps/extension-next
        run: npm run build
