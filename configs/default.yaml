server:
  host: "127.0.0.1"
  port: 8765
  db_path: "./data/kibitzer.sqlite3"

embedding:
  provider: "hash_cpu"
  model: "token-hash-v2"
  device: "cpu"
  forbid_gpu: true
  batch_size: 8
  normalize: true
  dimensions: 256

tier1:
  enabled: true
  # Windows package default: resolve local or cloud model settings through
  # KIBITZER_EXPERIMENT_MODELS_FILE instead of the original Mac-only path.
  # If the env var is not set, Tier 1 degrades to the Tier 0 verdict.
  provider: "experiment"
  base_url: "${TIER1_BASE_URL}"
  api_key_env: "ollama1"
  fallback_api_key_env: "ollama3"
  # Rotate across all three keys per call; order offset from tier2 so the two
  # tiers do not start on the same key.
  api_key_pool_envs: ["ollama1", "ollama3", "ollama2"]
  model: "cheap-classifier"
  timeout_seconds: 10
  recent_observations: 5
  experiment_models_file: "configs/models.local.yaml"
  experiment_model_key: "tier1_fast"
  send:
    title: true
    url_host: true
    url_path: false
    recent_titles: true
    page_excerpt: false

tier2:
  enabled: true
  provider: "experiment"
  base_url: "${TIER2_BASE_URL}"
  api_key_env: "ollama2"
  fallback_api_key_env: "ollama3"
  api_key_pool_envs: ["ollama2", "ollama3", "ollama1"]
  model: "minimax-m3"
  timeout_seconds: 180
  recent_observations: 5
  excerpt_char_limit: 3000
  max_output_tokens: 512
  experiment_models_file: "configs/models.local.yaml"
  experiment_model_key: "tier2_judge"

relevance:
  # Calibrated 2026-07-05 on a real Korean session: CJK-bigram hash embedding put
  # on-goal titles at >= 0.207 and off-goal titles at <= 0.0. Provisional until
  # the replay CLI enables systematic tuning. Misses are acceptable; false
  # positives are not, so the threshold sits below the observed on-goal minimum.
  tau_ok: 0.15
  beta: 0.85
  anchor_window: 10
  exemplar_cap: 20
  # Anchor admission guard (2026-07-08, from the LG그램 session audit): pages
  # whose OK came only from anchor similarity (exemplar score < epsilon) keep
  # the OK verdict but are excluded from the anchor, so one borderline OK can
  # no longer whitelist a whole platform. Tune via the replay CLI later.
  anchor_epsilon: 0.05

controller:
  type: "streak"
  k: 3
  alignment_alpha: 0.85
  theta_low: 0.15
  theta_high: 0.30
  cooldown_seconds: 300
  snooze_seconds: 1800
  coldstart_observations: 5

privacy:
  sensitive_domains_file: "configs/sensitive_domains.yaml"
  strip_query: true
  hash_url_path: true

delivery:
  channel: "chrome_notification"
  persona: "dry_kibitzer"
  personas_file: "configs/personas.yaml"
  max_sentences: 2
  voice:
    enabled: false
    voice: "Yuna"
    rate: 175
  quiet_hours:
    enabled: false
    start: "09:00"
    end: "18:00"
