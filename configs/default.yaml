server:
  db_path: "./data/kibitzer.sqlite3"

security:
  # Stable unpacked-development ID derived from apps/extension/manifest.json.
  # Add the production Web Store ID when assigned. A non-empty
  # KIBITZER_EXTENSION_IDS value in .env overrides this list.
  allowed_extension_ids: ["pkfnofjnjaojkamahhoipkeaiaecdkgc"]

embedding:
  provider: "onnx_cpu"
  model: "./data/models/koen-e5-tiny-onnx/onnx/model_qint8_arm64.onnx"
  tokenizer_path: "./data/models/koen-e5-tiny-onnx/tokenizer.json"
  device: "cpu"
  forbid_gpu: true
  # This qint8 export is batch-shape-sensitive on Windows x64. Kibitzer embeds
  # one goal or page title at a time, so force single-item inference for stable
  # scores independent of the caller's input grouping.
  batch_size: 1
  max_length: 128
  normalize: true
  dimensions: 384

tier1:
  enabled: true
  # Windows package default: resolve local or cloud model settings through
  # KIBITZER_EXPERIMENT_MODELS_FILE instead of the original Mac-only path.
  # If the env var is not set, Tier 1 degrades to the Tier 0 verdict.
  provider: "experiment"
  base_url: "${TIER1_BASE_URL}"
  api_key_env: "ollama1"
  fallback_api_key_env: "ollama3"
  # Rotate across all three keys per call; order offset from tier2 so the two
  # tiers do not start on the same key.
  api_key_pool_envs: ["ollama1", "ollama3", "ollama2"]
  model: "cheap-classifier"
  timeout_seconds: 10
  recent_observations: 5
  experiment_models_file: "configs/models.local.yaml"
  experiment_model_key: "tier1_fast"
  send:
    title: true
    url_host: true
    recent_titles: true

tier2:
  enabled: true
  provider: "experiment"
  base_url: "${TIER2_BASE_URL}"
  api_key_env: "ollama2"
  fallback_api_key_env: "ollama3"
  api_key_pool_envs: ["ollama2", "ollama3", "ollama1"]
  model: "minimax-m3"
  timeout_seconds: 180
  recent_observations: 30
  excerpt_char_limit: 3000
  max_output_tokens: 4096
  writer_max_output_tokens: 1024
  experiment_models_file: "configs/models.local.yaml"
  experiment_model_key: "tier2_judge"

relevance:
  # Provisional rounded default selected from the 200-pair benchmark without
  # cross-validation. Recalibrate on labeled exploration history before
  # treating this as a production estimate.
  tau_ok: 0.6
  beta: 0.85
  anchor_window: 10
  exemplar_cap: 20
  # Anchor admission guard (2026-07-08, from the LG그램 session audit): pages
  # whose OK came only from anchor similarity (exemplar score < epsilon) keep
  # the OK verdict but are excluded from the anchor, so one borderline OK can
  # no longer whitelist a whole platform. Tune via the replay CLI later.
  anchor_epsilon: 0.05

goal_enrichment:
  enabled: true
  max_phrases: 8
  # derived_tau was calibrated (2026-07-09) against hash-bucket noise, where
  # random collisions scored up to ~0.29. Under the ONNX provider (PR #29,
  # tau_ok 0.6) the gate no longer decides verdicts — a derived match enters
  # max() and only flips a verdict once it clears relevance.tau_ok anyway —
  # so it survives only as a noise floor for stored derived_score
  # diagnostics. See docs/handoff-goal-enrichment.md addendum (2026-07-13).
  derived_tau: 0.25
  timeout_seconds: 20

judgment_audit:
  enabled: true
  # Provisional ONNX-scale band (tau_ok 0.6 era): audits Tier-0 OKs whose r0
  # sits in [tau_ok, audit_ok_below). The hash-era calibration was 0.35 under
  # tau_ok 0.15. Benchmark-v2 sweep (bare onnx_score, 2026-07-20): all 10
  # benchmark false-OKs sit in [0.61, 0.76]; 0.70 catches 8/10 via low_margin
  # at 8/25 (32%) pre-reuse benchmark volume — the knee point. Enrichment
  # lifts related scores above the band and per-page reuse cuts repeat cost,
  # so live volume runs lower. Final calibration on the private corpus replay
  # (docs/handoff-audit-routing.md, re-implementation note 2).
  audit_ok_below: 0.7
  audit_low_quality_titles: true
  audit_mixed_hosts: true
  mixed_host_window_minutes: 10
  risk_hosts: []

controller:
  type: "streak"
  k: 3
  alignment_alpha: 0.85
  theta_low: 0.15
  theta_high: 0.30
  cooldown_seconds: 300
  snooze_seconds: 1800
  coldstart_observations: 5

celebration:
  # 0.5 = 30s — dogfooding setting so returns celebrate quickly; the shipped
  # default should move back toward 3 once the loop is validated.
  min_drift_minutes: 0.5
  cooldown_seconds: 300

break:
  duration_seconds: 300
dwell:
  observation_seconds: 5
  tier2_seconds: 10

time_budget:
  enabled: true
  total_fraction: 0.1666666667
  min_total_seconds: 300
  fallback_total_seconds: 900
  per_page_seconds: 180
  heartbeat_seconds: 60
  max_heartbeat_gap_seconds: 90
  recent_excerpts: 5
  recent_excerpt_char_limit: 600

privacy:
  sensitive_domains_file: "configs/sensitive_domains.json"

delivery:
  persona: "dry_kibitzer"
  personas_file: "configs/personas.yaml"
  custom_personas_file: "~/.kibitzer/personas.yaml"
  max_sentences: 2
  voice:
    enabled: false
    voice: "Yuna"
    rate: 175
  quiet_hours:
    enabled: false
    start: "09:00"
    end: "18:00"
