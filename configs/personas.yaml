# Kibitzer personas — manifest. Individual persona definitions live in
# configs/personas/<NN>-<key>.yaml (one persona per file, merged by the server
# in sorted filename order; see apps/server/app/core/personas.py). Shared authoring rules:
# - style_prompt is a STYLE layer for the plain-text Message Writer call. The
#   Writer contract (Korean plain text, judge decision is final, title/host-only
#   evidence, nag ordinal = nag_count_today + 1, no signal ledgers) is composed
#   in code and must never be duplicated or overridden here.
# - The Writer never receives page excerpts: examples and rules must not lean on
#   page-body details (prices, view counts, timers). Title/host words only.
# - Template placeholders: {goal} {title} {host} {nag_count} {return_minutes}
#   ({nag_count} in fallbacks is already the current ordinal, computed in code.)
# - celebrate_templates fire on drift-departure -> return; picked at random.
# - fallback_templates are indexed by nag_count (sequential and cyclic) — order
#   the first cycle as a progression where useful (e.g. baseball bases).
# - Server clamps messages at max_sentences (default 2; per-persona override).
#   Never put a punchline in sentence 3 unless the persona sets max_sentences: 3.
#   Standalone interjections ("어?", "비상!") count as full sentences.
# - Few-shot pools are mandatory: one lone example gets parroted by minimax-m3.
#
# Design brief v5 (2026-07-16, judge/writer split): 10 personas rebuilt from a
# curated meme corpus and adapted to the excerpt-free Writer contract — see
# docs/persona-voice-revamp.md and docs/handoff-tier2-judge-writer.md.

version: 1
default: dry_kibitzer
