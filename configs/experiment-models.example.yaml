# Copy this file to configs/models.local.yaml and edit for your machine.
# The top-level keys are referenced from configs/default.yaml via
# tier{1,2}.experiment_model_key.
#
# Default setup: Ollama Cloud (https://ollama.com). Put your API key in .env
# ONCE (ollama1= / ollama2= / optional ollama3=, see .env.example) — every
# server start picks it up automatically; keys never go in this file or repo.
#
# Picking models: browse https://ollama.com/library, but note many cloud models
# are subscription-gated (HTTP 403 on the free tier). Verify with
# GET https://ollama.com/api/tags and a 1-token chat probe before committing to
# one. Reasoning models spend tokens thinking before the JSON answer — give
# tier1 max_output_tokens headroom (>= 320) or replies come back empty.

tier1_fast:
  # Tier 1 hot-path classifier: must answer well inside the 10s tier1 config
  # timeout (timeout_sec here is ignored for tier1).
  api_url: "https://ollama.com/api/chat"
  api_style: "ollama"
  ollama_model: "nemotron-3-super"
  timeout_sec: 10
  max_output_tokens: 320

tier2_judge:
  # Tier 2 precise judge + Korean message writer.
  api_url: "https://ollama.com/api/chat"
  api_style: "ollama"
  ollama_model: "minimax-m3"
  timeout_sec: 120
  max_output_tokens: 640

# Self-hosted Ollama also works (same api_style; local URLs need no API key),
# as do OpenAI-compatible endpoints:
#   api_url: "https://api.example.com/v1/chat/completions"
#   api_style: "openai"
#   model_name: "some-model"
#   api_key: ""   # or leave unset and use the .env variable
