# Copy this file to configs/models.local.yaml and edit for your machine.
# The top-level keys are referenced from configs/default.yaml via
# tier{1,2}.experiment_model_key.
#
# Default setup: Ollama Cloud (https://ollama.com). Put your API key in .env
# ONCE (ollama1= / ollama2=, see .env.example) — every server start picks it up
# automatically; keys never go in this file or in the repo.
# Browse models at https://ollama.com/library and swap `ollama_model` freely.

gemma4:
  # Tier 1 hot-path classifier: small, fast model. The tier1 config timeout
  # (10s) applies instead of timeout_sec here. Check availability with
  # GET https://ollama.com/api/tags before picking a model.
  api_url: "https://ollama.com/api/chat"
  api_style: "ollama"
  ollama_model: "gemma3:4b"
  timeout_sec: 10
  max_output_tokens: 128

ollama_cloud_gemma4_31b:
  # Tier 2 precise judge.
  api_url: "https://ollama.com/api/chat"
  api_style: "ollama"
  ollama_model: "gemma4:31b"
  timeout_sec: 120
  max_output_tokens: 512

# Self-hosted Ollama also works (same api_style; local URLs need no API key),
# as do OpenAI-compatible endpoints:
#   api_url: "https://api.example.com/v1/chat/completions"
#   api_style: "openai"
#   model_name: "some-model"
#   api_key: ""   # or leave unset and use the .env variable
